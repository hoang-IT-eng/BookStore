[build]
  publish = "."

# Chỉ redirect khi truy cập URL không khớp file nào (404 thực sự)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# Cache lâu cho ảnh, font, CSS, JS (có hash trong tên)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Không cache file HTML để luôn lấy bản mới nhất
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Security headers cho toàn bộ trang
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
